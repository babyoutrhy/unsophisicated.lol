<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Unsophisticated</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100vh;               /* full viewport height */
      background: #000000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #ededed;
      line-height: 1.5;
    }

    body {
      background-image: radial-gradient(rgba(120, 0, 0, 0.08) 1px, transparent 1px);
      background-size: 30px 30px;
      display: flex;
      align-items: center;        /* vertical centering */
      justify-content: center;    /* horizontal centering */
    }

    .error-card {
      max-width: 600px;
      width: 90%;
      background: #080808;
      border: 2px solid #8b1a1a;
      padding: 3rem 2rem;
      box-shadow: 8px 8px 0 rgba(100, 0, 0, 0.2);
      text-align: center;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #8b1a1a;
      text-shadow: 0 0 10px rgba(139, 26, 26, 0.5);
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 2rem;
      color: #b31b1b;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    p {
      color: #a55a5a;
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .home-button {
      display: inline-block;
      background: transparent;
      border: 2px solid #a52a2a;
      color: #d6a0a0;
      padding: 0.8rem 1.8rem;
      font-size: 1rem;
      font-family: 'SF Mono', monospace;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      border-radius: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .home-button:hover {
      background: #8b1a1a;
      color: #000000;
      border-color: #ad3b3b;
    }

    .footer {
      margin-top: 2rem;
      color: #4f2d2d;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    @media (max-width: 600px) {
      .error-code { font-size: 4rem; }
      h2 { font-size: 1.6rem; }
      .error-card { padding: 2rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>
    <h2>Page Not Found</h2>
    <p>The page you are looking for doesn’t exist or has been moved.</p>
    <a href="/" class="home-button">Return to Home</a>
    <div class="footer">⎯ Unsophisticated // Lost ⎯</div>
  </div>
</body>
</html>

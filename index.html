<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Unsophisicated</title>
  <!-- Font Awesome 6.7.2 (latest stable) – black‑red stylish, no light red -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    /* ---------- RESET & GLOBAL ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      min-height: 100vh;
      background: #000000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #ededed;
      line-height: 1.5;
    }

    /* custom scroll – black & red */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #8b0000;
      border-radius: 0px;
      border: 1px solid #1a0000;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #a50000;
    }

    /* ---------- BLACK‑RED VARIABLES ---------- */
    :root {
      --black: #000000;
      --red-deep: #8b1a1a;
      --red-strong: #a51e1e;
      --card-bg: #080808;
    }

    /* ---------- LOADING SCREEN – BLOCKS INTERACTION ---------- */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      opacity: 1;
      pointer-events: auto; /* blocks clicks on content behind */
    }

    .greeting {
      text-align: center;
      border: 2px solid var(--red-deep);
      padding: 2.4rem 3.2rem;
      background: rgba(0,0,0,0.85);
      box-shadow: 0 0 20px rgba(139, 0, 0, 0.25);
      letter-spacing: 2px;
      position: relative;
      margin-bottom: 2rem; /* space for the bar */
    }

    .greeting h1 {
      font-size: 2.8rem;
      font-weight: 500;
      color: var(--red-deep);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid #3a1a1a;
      padding-bottom: 0.5rem;
      text-shadow: 0 0 5px #4d0000;
    }

    .greeting p {
      font-size: 1.2rem;
      color: #bbb;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    /* ---------- PROGRESS BAR (deep red tones) ---------- */
    .loading-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #2a0e0e;  /* dark red background */
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: #b31b1b;  /* intense deep red – no light red */
      transition: width linear;
    }

    /* fade-out class */
    .loading-screen.fade-out {
      opacity: 0;
    }

    /* ---------- MAIN CONTENT ---------- */
    .content {
      display: block;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 3.5rem;
      border-bottom: 2px solid var(--red-deep);
      padding-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 2.6rem;
      font-weight: 500;
      color: #b31b1b;
      text-transform: uppercase;
      text-shadow: 2px 2px 0px #1a0000;
    }

    .header-line {
      color: #7a3a3a;
      font-size: 0.9rem;
      text-transform: uppercase;
      border: 1px solid #3d1e1e;
      padding: 0.3rem 0.9rem;
      letter-spacing: 3px;
    }

    /* profile cards */
    .profile {
      background: var(--card-bg);
      border: 1.2px solid #3c1c1c;
      padding: 2.2rem 2rem;
      margin-bottom: 2.8rem;
      box-shadow: 8px 8px 0 rgba(100, 0, 0, 0.2);
      transition: border 0.2s, box-shadow 0.2s;
    }

    .profile:hover {
      border-color: #942525;
      box-shadow: 10px 10px 0 rgba(130, 0, 0, 0.25);
    }

    .profile-name {
      font-size: 2rem;
      font-weight: 450;
      color: #c22a2a;
      margin-bottom: 1.6rem;
      border-left: 6px solid #6e0000;
      padding-left: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      word-break: break-word;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .social-item i {
      font-size: 1.9rem;
      width: 2.4rem;
      text-align: center;
      color: #ac2c2c;
      transition: transform 0.15s, color 0.2s;
    }

    .social-item:hover i {
      color: #dc3a3a;
      transform: scale(1.05);
    }

    .social-button {
      background: transparent;
      border: 1.8px solid #a52a2a;
      color: #d6a0a0;
      padding: 0.65rem 1.3rem;
      font-size: 1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      text-decoration: none;
      word-break: break-word;
      flex: 1;
      min-width: 200px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      border-radius: 0px;
      font-weight: 400;
      text-align: left;
    }

    .social-button:hover {
      background: #941c1c;
      border-color: #ad3b3b;
      color: #000000;
    }

    @media (max-width: 600px) {
      .social-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .social-button {
        width: 100%;
      }
    }

    body {
      background-image: radial-gradient(rgba(120, 0, 0, 0.08) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .ghost-footer {
      margin-top: 3rem;
      text-align: right;
      color: #4f2d2d;
      font-size: 0.8rem;
      border-top: 1px solid #2e1a1a;
      padding-top: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    *:focus-visible {
      outline: 2px solid #9e2626;
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <!-- LOADING SCREEN WITH PROGRESS BAR (blocks clicks) -->
  <div class="loading-screen" id="loadingScreen">
    <div class="greeting">
      <h1>UNSOPHISICATED</h1>
      <p>✦ GREETINGS ✦</p>
      <!-- progress bar attached to greeting bottom -->
      <div class="loading-bar-container">
        <div class="loading-bar" id="loadingBar"></div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">
    <header>
      <h1>UNSOPHISICATED</h1>
      <div class="header-line">BLACK · RED</div>
    </header>

    <main>
      <!-- PROFILE 1 : неискушенный666 -->
      <div class="profile">
        <div class="profile-name">неискушенный666</div>
        <div class="social-links">
          <div class="social-item">
            <i class="fab fa-instagram"></i>
            <a href="https://instagram.com/yungrhy" class="social-button" target="_blank" rel="noopener noreferrer">Instagram</a>
          </div>
          <div class="social-item">
            <i class="fab fa-telegram"></i>
            <a href="https://t.me/purrcating" class="social-button" target="_blank" rel="noopener noreferrer">Telegram</a>
          </div>
          <div class="social-item">
            <i class="fab fa-x-twitter"></i>
            <a href="https://x.com/babyoutrhy" class="social-button" target="_blank" rel="noopener noreferrer">X (Twitter)</a>
          </div>
          <div class="social-item">
            <i class="fab fa-github"></i>
            <a href="https://github.com/babyoutrhy" class="social-button" target="_blank" rel="noopener noreferrer">GitHub</a>
          </div>
        </div>
      </div>

      <!-- PROFILE 2 : коварная666 -->
      <div class="profile">
        <div class="profile-name">коварная666</div>
        <div class="social-links">
          <div class="social-item">
            <i class="fab fa-telegram"></i>
            <a href="https://t.me/s_bunnies" class="social-button" target="_blank" rel="noopener noreferrer">Telegram</a>
          </div>
          <div class="social-item">
            <i class="fab fa-tiktok"></i>
            <a href="https://www.tiktok.com/@gk_3789" class="social-button" target="_blank" rel="noopener noreferrer">TikTok</a>
          </div>
        </div>
      </div>
      
      <div class="ghost-footer">
        <span>⎯ UNSOPHISICATED // MAINTAIN ⎯</span>
      </div>
    </main>
  </div>

  <script>
    (function() {
      'use strict';
      window.addEventListener('load', function() {
        const loadingEl = document.getElementById('loadingScreen');
        const barEl = document.getElementById('loadingBar');
        if (!loadingEl || !barEl) return;

        // random delay between 2500ms and 7000ms
        const minDelay = 2500;
        const maxDelay = 7000;
        const randomDelay = Math.floor(Math.random() * (maxDelay - minDelay + 1)) + minDelay;

        // start progress bar animation: width 0% → 100% over randomDelay ms
        barEl.style.transition = `width ${randomDelay}ms linear`;
        // trigger reflow to ensure transition starts
        barEl.offsetHeight; 
        barEl.style.width = '100%';

        // after the exact fill duration, fade out the loading screen
        setTimeout(function() {
          loadingEl.classList.add('fade-out');
          
          // after fade transition (0.6s), remove from DOM to fully enable interaction
          setTimeout(function() {
            loadingEl.style.display = 'none';
          }, 600);
        }, randomDelay);
      });
    })();
  </script>

  <!-- only russian text: profile names "неискушенный666" + "коварная666" -->
</body>
</html>
